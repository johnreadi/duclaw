version: '3.8'

services:
  duclaw-db:
    image: postgres:15-alpine
    container_name: duclaw-db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=duclaw
      - POSTGRES_USER=duclaw
      - POSTGRES_PASSWORD=${DB_PASSWORD:-duclaw_password}
    volumes:
      - duclaw-db-data:/var/lib/postgresql/data
    networks:
      - dokploy-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U duclaw"]
      interval: 10s
      timeout: 5s
      retries: 5

  duclaw-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: duclaw-backend
    restart: unless-stopped
    privileged: true
    environment:
      - PORT=3000
      - DOCKER_SOCKET=/var/run/docker.sock
      - CHECK_INTERVAL=30000
      - DB_HOST=duclaw-db
      - DB_PORT=5432
      - DB_NAME=duclaw
      - DB_USER=duclaw
      - DB_PASSWORD=${DB_PASSWORD:-duclaw_password}
      - JWT_SECRET=${JWT_SECRET:-changez_ce_secret_en_production}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - ALERT_EMAIL=${ALERT_EMAIL}
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL}
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL}
    depends_on:
      duclaw-db:
        condition: service_healthy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "3004:3000"
    networks:
      - dokploy-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  duclaw-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: duclaw-frontend
    restart: unless-stopped
    depends_on:
      - duclaw-backend
    ports:
      - "3003:80"
    networks:
      - dokploy-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  duclaw-db-data:

networks:
  dokploy-network:
    external: true
