version: '3.8'

services:
  duclaw-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: duclaw-backend
    restart: unless-stopped
    environment:
      - PORT=3000
      - DOCKER_SOCKET=/var/run/docker.sock
      - CHECK_INTERVAL=30000
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "3004:3000"
    networks:
      - dokploy-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  duclaw-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: duclaw-frontend
    restart: unless-stopped
    depends_on:
      - duclaw-backend
    ports:
      - "3003:80"
    networks:
      - dokploy-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  dokploy-network:
    external: true
